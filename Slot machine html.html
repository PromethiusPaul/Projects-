<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slot Machine RNG</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .machine {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }
    p {
      margin: 0 0 20px;
      color: #d1d5db;
    }
    .reels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 24px 0;
    }
    .reel {
      background: #fff;
      color: #111827;
      border-radius: 18px;
      padding: 28px 10px;
      font-size: 3rem;
      font-weight: bold;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 4px #e5e7eb;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .spin-btn {
      background: #22c55e;
      color: #052e16;
    }
    .reset-btn {
      background: #f59e0b;
      color: #3b2200;
    }
    .message {
      margin-top: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 28px;
    }
    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 22px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
    }
    .label {
      font-size: 0.85rem;
      color: #cbd5e1;
      margin-bottom: 4px;
    }
    .value {
      font-size: 1.15rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="machine">
    <h1>🎰 Slot Machine RNG</h1>
    <p>Press spin to generate a random slot machine result.</p>

    <div class="reels">
      <div class="reel" id="reel1">🍒</div>
      <div class="reel" id="reel2">🍋</div>
      <div class="reel" id="reel3">🔔</div>
    </div>

    <div class="controls">
      <button class="spin-btn" id="spinBtn">Spin</button>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <div class="message" id="message">Try your luck.</div>

    <div class="scoreboard">
      <div class="card">
        <div class="label">Credits</div>
        <div class="value" id="credits">100</div>
      </div>
      <div class="card">
        <div class="label">Last Win</div>
        <div class="value" id="lastWin">0</div>
      </div>
      <div class="card">
        <div class="label">Jackpots</div>
        <div class="value" id="jackpots">0</div>
      </div>
    </div>
  </div>

  <script>
    const symbols = ["🍒", "🍋", "🔔", "💎", "7️⃣", "⭐"];
    const reelEls = [
      document.getElementById("reel1"),
      document.getElementById("reel2"),
      document.getElementById("reel3")
    ];
    const messageEl = document.getElementById("message");
    const creditsEl = document.getElementById("credits");
    const lastWinEl = document.getElementById("lastWin");
    const jackpotsEl = document.getElementById("jackpots");
    const spinBtn = document.getElementById("spinBtn");
    const resetBtn = document.getElementById("resetBtn");

    let credits = 100;
    let lastWin = 0;
    let jackpots = 0;
    const spinCost = 5;

    function getRandomSymbol() {
      const index = Math.floor(Math.random() * symbols.length);
      return symbols[index];
    }

    function updateBoard() {
      creditsEl.textContent = credits;
      lastWinEl.textContent = lastWin;
      jackpotsEl.textContent = jackpots;
    }

    function evaluateSpin(results) {
      const [a, b, c] = results;

      if (a === b && b === c) {
        if (a === "7️⃣") {
          jackpots += 1;
          return { win: 100, text: "JACKPOT! Triple 7s!" };
        }
        return { win: 40, text: "Big win! Three of a kind!" };
      }

      if (a === b || b === c || a === c) {
        return { win: 15, text: "Nice! You matched two symbols." };
      }

      return { win: 0, text: "No match. Spin again." };
    }

    async function animateSpin(finalResults) {
      spinBtn.disabled = true;
      for (let i = 0; i < 12; i++) {
        reelEls.forEach(reel => {
          reel.textContent = getRandomSymbol();
        });
        await new Promise(resolve => setTimeout(resolve, 80));
      }
      reelEls.forEach((reel, index) => {
        reel.textContent = finalResults[index];
      });
      spinBtn.disabled = false;
    }

    async function spin() {
      if (credits < spinCost) {
        messageEl.textContent = "Not enough credits. Press reset to play again.";
        return;
      }

      credits -= spinCost;
      const results = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];
      await animateSpin(results);

      const outcome = evaluateSpin(results);
      lastWin = outcome.win;
      credits += outcome.win;
      messageEl.textContent = outcome.text;
      updateBoard();
    }

    function resetGame() {
      credits = 100;
      lastWin = 0;
      jackpots = 0;
      reelEls[0].textContent = "🍒";
      reelEls[1].textContent = "🍋";
      reelEls[2].textContent = "🔔";
      messageEl.textContent = "Game reset. Try your luck.";
      updateBoard();
    }

    spinBtn.addEventListener("click", spin);
    resetBtn.addEventListener("click", resetGame);
    updateBoard();
  </script>
</body>
</html>
