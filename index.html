<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Operations Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Restaurant Operations Dashboard</h1>
      <p>Track labor, sales, and inventory alerts with a lightweight front-end app.</p>
    </header>

    <section class="card grid">
      <div>
        <label>Daily Sales ($)</label>
        <input id="sales" type="number" placeholder="e.g. 5200" />
      </div>
      <div>
        <label>Labor Cost ($)</label>
        <input id="labor" type="number" placeholder="e.g. 1450" />
      </div>
      <div>
        <label>Inventory Alerts</label>
        <input id="inventory" type="number" placeholder="e.g. 3" />
      </div>
      <div>
        <label>Guest Satisfaction (%)</label>
        <input id="satisfaction" type="number" placeholder="e.g. 92" />
      </div>
      <button id="saveBtn">Save Metrics</button>
    </section>

    <section class="stats">
      <div class="card stat">
        <h2>Labor %</h2>
        <p id="laborPct">0%</p>
      </div>
      <div class="card stat">
        <h2>Status</h2>
        <p id="status">Waiting for input</p>
      </div>
      <div class="card stat">
        <h2>Latest Saved</h2>
        <p id="savedAt">None</p>
      </div>
    </section>

    <section class="card">
      <h2>Saved Snapshots</h2>
      <ul id="history"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
